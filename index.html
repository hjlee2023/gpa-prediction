<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>학점 트레이딩 뷰 - GPA Predictor</title>
    <meta name="description" content="기술적 분석 프레임워크를 활용한 나의 다음 학기 학점 예측 및 분석 가이드">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="logo">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="20" x2="18" y2="10"></line>
                    <line x1="12" y1="20" x2="12" y2="4"></line>
                    <line x1="6" y1="20" x2="6" y2="14"></line>
                    <polyline points="2 8 6 4 12 10 22 2"></polyline>
                </svg>
                <h1>GPA TradingView</h1>
            </div>
            <p class="subtitle">학점도 기술적 분석 시대. 추세를 읽고 다음 학기를 예측하세요.</p>
        </header>

        <main class="main-content">
            <section class="input-section">
                <div class="section-header" style="display: flex; justify-content: space-between; align-items: center;">
                    <h2>학기별 학점 입력</h2>
                    <div class="max-gpa-selector" style="font-size: 0.9rem; color: var(--text-secondary);">
                        <label for="max-gpa-select">만점 기준:</label>
                        <select id="max-gpa-select" style="padding: 4px 8px; border-radius: 4px; border: 1px solid var(--border-color); background: var(--bg-primary); color: var(--text-primary);">
                            <option value="4.3" selected>4.3 만점</option>
                            <option value="4.5">4.5 만점</option>
                        </select>
                    </div>
                </div>
                
                <div id="semester-list" class="semester-list">
                    <!-- JavaScript will populate this -->
                </div>

                <div class="action-buttons">
                    <button id="add-semester-btn" class="btn btn-secondary">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                        초과 학기 추가
                    </button>
                    <button id="analyze-btn" class="btn btn-primary">
                        🤖 AI 차트 분석하기
                    </button>
                </div>
            </section>

            <section class="chart-section" style="display: none;" id="analysis-results">
                <div class="drawing-tools">
                    <button id="toggle-yaxis-btn" class="btn btn-secondary">🙈 축 숫자 숨기기</button>
                </div>
                <h2>✨ 학점 차트 분석기 ✨</h2>
                <div class="chart-container" style="position: relative;">
                    <canvas id="gpaChart"></canvas>
                </div>
                <div class="prediction-box">
                    <h3>다음 학기 예측 학점</h3>
                    <div class="predicted-score" id="predicted-score">--</div>
                    <p class="prediction-detail" id="prediction-detail">데이터를 분석 중입니다...</p>
                </div>
            </section>
        </main>
    </div>

    <!-- Chart.js and Plugins -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation"></script>
    <!-- Custom Auto Script -->
    <script src="script_auto.js?v=2"></script>
</body>
</html>
